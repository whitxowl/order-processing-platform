spring:
  application:
    name: product-service-test

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      auto-index-creation: true

  kafka:
    bootstrap-servers: localhost:9092

app:
  cleanup:
    orphan-images-cron: "-"

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  server-url: http://localhost:8080