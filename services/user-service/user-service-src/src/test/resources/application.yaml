spring:
  test:
    database:
      replace: none

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

app:
  kafka:
    topics:
      user-created: user.created
      user-role-changed: user.role-changed