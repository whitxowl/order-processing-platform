<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<body>
<p>Здравствуйте!</p>

<div th:if="${status == 'RESERVED'}">
    <p>Товар по заказу <strong th:text="${orderId}"></strong> успешно зарезервирован. Ваш заказ подтверждён.</p>
</div>

<div th:if="${status == 'CANCELLED'}">
    <p>К сожалению, заказ <strong th:text="${orderId}"></strong> был отменён.</p>
</div>

<p>Товар: <strong th:text="${productId}"></strong>, количество: <strong th:text="${quantity}"></strong></p>

</body>
</html>
