spring:
  test:
    database:
      replace: none

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

security:
  jwt:
    secret: dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgZGV2ZWxvcG1lbnQgb25seSEhIQ==
    access-ttl: 15m
    refresh-ttl: 7d
    issuer: auth-service

app:
  kafka:
    topics:
      user-created: user.created
      user-role-changed: user.role-changed