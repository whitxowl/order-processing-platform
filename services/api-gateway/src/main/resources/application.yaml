spring:
  application:
    name: api-gateway

server:
  port: 8080

services:
  auth-service-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  user-service-url: ${USER_SERVICE_URL:http://localhost:8082}
  product-service-url: ${PRODUCT_SERVICE_URL:http://localhost:8083}
  inventory-service-url: ${INVENTORY_SERVICE_URL:http://localhost:8084}
  order-service-url: ${ORDER_SERVICE_URL:http://localhost:8085}
  notification-service-url: ${NOTIFICATION_SERVICE_URL:http://localhost:8086}

security:
  jwt:
    secret: ${JWT_SECRET:dGhpcyBpcyBhIHZlcnkgc2VjcmV0IGtleSBmb3IgZGV2ZWxvcG1lbnQgb25seSEhIQ==}
    issuer: auth-service
  internal:
    secret: ${INTERNAL_SECRET:dev-internal-secret}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318}/v1/traces