name: CI

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ master ]

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/order-processing-platform
  REGISTRY: ghcr.io

jobs:
  build:
    name: Checkstyle + Tests + Coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Checkstyle
        run: ./mvnw checkstyle:check --no-transfer-progress

      - name: Build, test & install
        run: ./mvnw clean install --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 7

      - name: Upload JaCoCo coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: '**/target/site/jacoco/'
          retention-days: 7

      - name: Test Report Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Results
          path: '**/target/surefire-reports/TEST-*.xml'
          reporter: java-junit

  quality-gate:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-

      - name: OWASP Dependency Check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          ./mvnw dependency-check:check --no-transfer-progress \
            -DnvdApiKey=$NVD_API_KEY

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: '**/target/dependency-check-report.html'
          retention-days: 7

  docker:
    name: Docker Build, Scan & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build jar artifacts
        run: ./mvnw clean package -DskipTests --no-transfer-progress

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker images
        run: |
          SERVICES="auth-service user-service product-service inventory-service order-service notification-service api-gateway"
          for svc in $SERVICES; do
            docker build \
              -f services/$svc/Dockerfile \
              -t ${{ env.IMAGE_PREFIX }}/$svc:${{ github.sha }} \
              -t ${{ env.IMAGE_PREFIX }}/$svc:latest \
              .
          done

      - name: Run Trivy on each image
        run: |
          SERVICES="auth-service user-service product-service inventory-service order-service notification-service api-gateway"
          FAILED=""
          for svc in $SERVICES; do
            echo "=== Scanning $svc ==="
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v $HOME/.cache/trivy:/root/.cache/trivy \
              aquasec/trivy:latest image \
              --severity CRITICAL \
              --ignore-unfixed \
              --exit-code 1 \
              ${{ env.IMAGE_PREFIX }}/$svc:${{ github.sha }} || FAILED="$FAILED $svc"
          done
          if [ -n "$FAILED" ]; then
            echo "CRITICAL vulnerabilities found in:$FAILED"
            exit 1
          fi

      - name: Upload Trivy results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-*.txt
          retention-days: 7

      - name: Push Docker images to GHCR
        run: |
          SERVICES="auth-service user-service product-service inventory-service order-service notification-service api-gateway"
          for svc in $SERVICES; do
            docker push ${{ env.IMAGE_PREFIX }}/$svc:${{ github.sha }}
            docker push ${{ env.IMAGE_PREFIX }}/$svc:latest
          done