{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name | kebabcase }}
  labels:
    {{- include "platform.labels" (dict "name" ($name | kebabcase) "release" $.Release.Name) | nindent 4 }}
spec:
  replicas: {{ $svc.replicas | default 1 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name | kebabcase }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name | kebabcase }}
    spec:
      containers:
        - name: {{ $name | kebabcase }}
          image: "{{ $svc.image | default (printf "%s:%s" ($name | kebabcase) $.Values.global.imageTag) }}"
          ports:
            - containerPort: {{ $svc.port }}
              name: http
            {{- if $svc.grpcPort }}
            - containerPort: {{ $svc.grpcPort }}
              name: grpc
            {{- end }}
          envFrom:
            - secretRef:
                name: platform-secrets
          {{- if $svc.env }}
          env:
            {{- range $key, $val := $svc.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
  {{- end }}